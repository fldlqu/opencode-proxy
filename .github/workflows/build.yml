name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install g++-16 + mold
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq software-properties-common
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update -qq
          sudo apt-get install -y -qq g++-16 libcurl4-openssl-dev mold
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-16 100

      - name: Build
        run: make linux

      - name: Size
        run: ls -lh zen_proxy

      - name: Upload Linux binary
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ github.ref_name }}" &>/dev/null; then
            gh release upload "${{ github.ref_name }}" zen_proxy --clobber
          else
            printf 'OpenCode Zen Proxy - %s\n\nPre-built binaries for Linux and Windows.\n' \
              "${{ github.ref_name }}" > /tmp/notes.md
            gh release create "${{ github.ref_name }}" \
              --title "zen_proxy ${{ github.ref_name }}" \
              --notes-file /tmp/notes.md
            gh release upload "${{ github.ref_name }}" zen_proxy
          fi

  windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW cross-toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq g++-mingw-w64-x86-64 \
            mingw-w64-x86-64-dev mold

      - name: Cross-compile libcurl for Windows
        run: |
          export PATH=/usr/x86_64-w64-mingw32/bin:$PATH
          export CC=x86_64-w64-mingw32-gcc
          export CXX=x86_64-w64-mingw32-g++-posix
          export AR=x86_64-w64-mingw32-ar
          export RANLIB=x86_64-w64-mingw32-ranlib
          export CFLAGS="-Os -flto -ffunction-sections -fdata-sections"

          curl -sL https://curl.se/download/curl-8.13.0.tar.gz -o curl.tar.gz
          tar xzf curl.tar.gz
          cd curl-8.13.0
          ./configure --host=x86_64-w64-mingw32 \
            --disable-shared --enable-static \
            --with-pic --without-ssl --without-zlib \
            --disable-ftp --disable-ldap --disable-ldaps \
            --disable-rtsp --disable-proxy --disable-dict \
            --disable-telnet --disable-tftp --disable-pop3 \
            --disable-imap --disable-smtp --disable-gopher \
            --disable-mqtt --disable-manual --disable-doh \
            --disable-hsts --disable-websockets \
            --enable-ipv6 --enable-tcp-nodelay \
            --disable-threaded-resolver 2>&1 | tail -3
          make -j$(nproc) 2>/dev/null
          echo "CURL_DIR=$PWD" >> $GITHUB_ENV

      - name: Build
        run: |
          CXX=x86_64-w64-mingw32-g++-posix
          STD=c++23
          echo | $CXX -std=c++26 -dM -E -x c++ - 2>/dev/null && STD=c++26 || true
          $CXX -std=$STD -Wall -Wextra -Os -flto \
            -ffunction-sections -fdata-sections -pipe \
            -fomit-frame-pointer -fno-stack-protector \
            -fno-math-errno \
            -D_WIN32_WINNT=0x0601 \
            -I$CURL_DIR/include \
            -o zen_proxy.exe zen_proxy.cpp \
            $CURL_DIR/lib/.libs/libcurl.a \
            -lws2_32 -lpthread \
            -Wl,--gc-sections -Wl,-s -Wl,--build-id=none 2>&1

      - name: Size
        run: ls -lh zen_proxy.exe

      - name: Upload Windows binary
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" zen_proxy.exe --clobber
