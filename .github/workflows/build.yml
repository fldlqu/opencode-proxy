name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64
            target: linux
            ext: ""

          - os: windows-latest
            name: windows-x86_64
            target: windows
            shell: msys2 {0}
            ext: .exe

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: ${{ matrix.shell || 'bash' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2 (Windows)
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc mingw-w64-x86_64-curl make

      - name: Install deps (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq software-properties-common
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update -qq
          sudo apt-get install -y -qq g++-16 libcurl4-openssl-dev mold
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-16 100

      - name: Build
        run: make ${{ matrix.target }}

      - name: Size
        run: ls -lh zen_proxy${{ matrix.ext }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "zen_proxy ${{ github.ref_name }}"
          body: |
            OpenCode Zen Proxy — ${{ github.ref_name }}

            Pre-built binaries for Linux (x86_64) and Windows (x86_64).

            ```
            ./zen_proxy                          # :8080, anonymous
            ./zen_proxy -p 9090 -k sk-xxxxx     # custom port + key
            ```
          files: zen_proxy${{ matrix.ext }}
          draft: false
          prerelease: false
