name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64
            install: sudo apt-get update -qq && sudo apt-get install -y -qq g++ libcurl4-openssl-dev
            strip: strip
            ext: ""

          - os: windows-latest
            name: windows-x86_64
            shell: msys2 {0}
            install: pacman -S --noconfirm mingw-w64-x86_64-gcc mingw-w64-x86_64-curl
            strip: true
            ext: .exe

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: ${{ matrix.shell || 'bash' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2 (Windows only)
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true

      - name: Install dependencies
        run: ${{ matrix.install }}

      - name: Build
        run: |
          CFLAGS="-std=c++26 -Wall -Wextra -Os -flto \
            -ffunction-sections -fdata-sections -pipe \
            -fomit-frame-pointer -fno-stack-protector \
            -fno-math-errno -fno-semantic-interposition"

          LDFLAGS="-lcurl -lpthread \
            -Wl,--gc-sections -Wl,-s -Wl,--build-id=none"

          g++ $CFLAGS -o zen_proxy${{ matrix.ext }} \
            zen_proxy.cpp $LDFLAGS

      - name: Strip (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          strip --remove-section=.comment \
            --remove-section=.gnu.version \
            --remove-section=.eh_frame \
            --remove-section=.eh_frame_hdr \
            --remove-section=.gcc_except_table \
            zen_proxy 2>/dev/null || true
          ls -lh zen_proxy

      - name: Size (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          ls -lh zen_proxy${{ matrix.ext }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "zen_proxy ${{ github.ref_name }}"
          body: |
            OpenCode Zen Proxy — ${{ github.ref_name }}

            Pre-built binaries:
            - **Linux** (x86_64, dynamically linked against libcurl)
            - **Windows** (x86_64, MSYS2/Mingw64, dynamically linked)

            ```
            ./zen_proxy                          # :8080, anonymous
            ./zen_proxy -p 9090 -k sk-xxxxx     # custom port + key
            ```
          files: zen_proxy${{ matrix.ext }}
          draft: false
          prerelease: false
