name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install g++-16 + mold
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq software-properties-common
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update -qq
          sudo apt-get install -y -qq g++-16 libcurl4-openssl-dev mold
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-16 100

      - name: Build
        run: make linux

      - name: Size
        run: ls -lh zen_proxy

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ github.ref_name }}" &>/dev/null; then
            gh release upload "${{ github.ref_name }}" zen_proxy --clobber
          else
            printf 'OpenCode Zen Proxy - %s\n\nPre-built Linux x86_64 binary.\n' \
              "${{ github.ref_name }}" > /tmp/notes.md
            gh release create "${{ github.ref_name }}" \
              --title "zen_proxy ${{ github.ref_name }}" \
              --notes-file /tmp/notes.md \
              zen_proxy
          fi
