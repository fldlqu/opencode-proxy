name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Android NDK
        run: |
          curl -sL https://dl.google.com/android/repository/android-ndk-r28-linux.zip -o ndk.zip
          unzip -q ndk.zip
          echo "NDK=$PWD/android-ndk-r28" >> $GITHUB_ENV
          echo "TOOLCHAIN=$PWD/android-ndk-r28/toolchains/llvm/prebuilt/linux-x86_64" >> $GITHUB_ENV

      - name: Build libcurl for Android
        run: |
          export PATH="$TOOLCHAIN/bin:$PATH"
          export CC=aarch64-linux-android24-clang
          export CXX=aarch64-linux-android24-clang++
          export AR=llvm-ar
          export RANLIB=llvm-ranlib
          export CFLAGS="-Oz -flto -ffunction-sections -fdata-sections"
          export CXXFLAGS="-Oz -flto -ffunction-sections -fdata-sections"

          curl -sL https://curl.se/download/curl-8.13.0.tar.gz -o curl.tar.gz
          tar xzf curl.tar.gz
          cd curl-8.13.0
          ./configure --host=aarch64-linux-android \
                      --disable-shared --enable-static \
                      --with-pic --without-ssl --without-zlib \
                      --disable-ftp --disable-file --disable-ldap \
                      --disable-ldaps --disable-rtsp --disable-proxy \
                      --disable-dict --disable-telnet --disable-tftp \
                      --disable-pop3 --disable-imap --disable-smtp \
                      --disable-gopher --disable-mqtt --disable-manual \
                      --disable-doh --disable-alt-svc \
                      --disable-hsts --disable-websockets \
                      --enable-ipv6 --enable-tcp-nodelay
          make -j$(nproc) 2>/dev/null
          echo "CURL_DIR=$PWD" >> $GITHUB_ENV

      - name: Build zen_proxy
        run: |
          export PATH="$TOOLCHAIN/bin:$PATH"
          export CXX=aarch64-linux-android24-clang++
          export CURL=$CURL_DIR

          $CXX -std=c++26 -Wall -Wextra -Oz -flto \
            -ffunction-sections -fdata-sections -pipe \
            -fno-semantic-interposition -fomit-frame-pointer \
            -fno-stack-protector -fno-math-errno -fno-ident \
            -I$CURL/include \
            -o zen_proxy zen_proxy.cpp \
            $CURL/lib/.libs/libcurl.a \
            -Wl,-z,now -Wl,--gc-sections -Wl,-s \
            -Wl,--build-id=none -Wl,--icf=all

          $TOOLCHAIN/bin/llvm-objcopy --remove-section=.comment \
            --remove-section=.note.android.ident \
            --remove-section=.gnu.version \
            --remove-section=.eh_frame \
            --remove-section=.eh_frame_hdr \
            --remove-section=.gcc_except_table \
            zen_proxy

          ls -lh zen_proxy

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "zen_proxy ${{ github.ref_name }}"
          body: |
            OpenCode Zen Proxy — ${{ github.ref_name }}

            - 23.6K statically linked Android aarch64 binary
            - C++26, zero warnings
            - Automatic model→endpoint routing
          files: zen_proxy
          draft: false
          prerelease: false
